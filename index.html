<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assinatura Digital - Field Control</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        canvas { border: 2px dashed #ccc; border-radius: 5px; background: #fff; width: 100%; max-width: 400px; height: 200px; touch-action: none; }
        button { background: #007bff; color: white; border: none; padding: 15px 25px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%; }
        .clear-btn { background: #dc3545; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Assinar Documento</h2>
        <p>Desenhe sua assinatura no quadro abaixo:</p>
        <canvas id="signature-pad"></canvas>
        <br>
        <button id="save-btn">Finalizar e Baixar PDF</button>
        <button class="clear-btn" id="clear-btn">Limpar Assinatura</button>
    </div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const signaturePad = new SignaturePad(canvas);

        // Ajustar resolução do canvas para mobile
        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }
        window.onresize = resizeCanvas;
        resizeCanvas();

        document.getElementById('clear-btn').addEventListener('click', () => signaturePad.clear());

        document.getElementById('save-btn').addEventListener('click', async () => {
            if (signaturePad.isEmpty()) {
                alert("Por favor, faça sua assinatura primeiro.");
                return;
            }

            const signatureImg = signaturePad.toDataURL('image/png');
            
            // 1. Carregar o PDF original (modelo.pdf deve estar na mesma pasta)
            const existingPdfBytes = await fetch('./modelo.pdf').then(res => res.arrayBuffer());
            const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
            
            // 2. Incorporar a assinatura
            const signatureImage = await pdfDoc.embedPng(signatureImg);
            const pages = pdfDoc.getPages();
            const firstPage = pages[0]; // Você pode escolher a página aqui (0 é a primeira)

            // 3. Desenhar a assinatura no PDF (Ajuste x e y conforme seu modelo)
            firstPage.drawImage(signatureImage, {
                x: 50,
                y: 100,
                width: 150,
                height: 75,
            });

            // 4. Salvar e baixar
            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "contrato_assinado.pdf";
            link.click();
        });
    </script>
</body>
</html>
