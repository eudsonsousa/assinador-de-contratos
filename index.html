<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assinador Field Control</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        canvas { border: 2px dashed #007bff; border-radius: 5px; background: #fff; width: 100%; height: 250px; touch-action: none; }
        button { background: #28a745; color: white; border: none; padding: 15px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; }
        .clear-btn { background: #6c757d; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Assinatura do Colaborador</h3>
        <p>Assine dentro do quadro azul:</p>
        <canvas id="signature-pad"></canvas>
        <button id="save-btn">✅ FINALIZAR E BAIXAR PDF</button>
        <button class="clear-btn" id="clear-btn">Limpar Quadro</button>
    </div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const signaturePad = new SignaturePad(canvas);

        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        document.getElementById('clear-btn').addEventListener('click', () => signaturePad.clear());

        document.getElementById('save-btn').addEventListener('click', async () => {
            if (signaturePad.isEmpty()) {
                alert("Por favor, faça sua assinatura.");
                return;
            }

            const btn = document.getElementById('save-btn');
            btn.innerText = "Processando... aguarde";
            btn.disabled = true;

            try {
                // 1. Tentar carregar o PDF
                const response = await fetch('./modelo.pdf');
                if (!response.ok) throw new Error("Arquivo 'modelo.pdf' não encontrado no servidor!");
                
                const existingPdfBytes = await response.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
                
                // 2. Preparar a assinatura
                const signatureImg = signaturePad.toDataURL('image/png');
                const signatureImage = await pdfDoc.embedPng(signatureImg);
                const firstPage = pdfDoc.getPages()[0];

                // 3. Posicionar a assinatura (Ajuste x e y aqui se precisar)
                firstPage.drawImage(signatureImage, {
                    x: 50,
                    y: 50,
                    width: 150,
                    height: 80,
                });

                // 4. Gerar e forçar o download
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = "OS_Assinada.pdf";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                alert("Download iniciado! Verifique sua pasta de arquivos.");
            } catch (err) {
                alert("Erro: " + err.message);
            } finally {
                btn.innerText = "✅ FINALIZAR E BAIXAR PDF";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
